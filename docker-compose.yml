services:
  bot:
    build: .
    container_name: rolador-bot
    ports:
      - "8080:8080"
    environment:
      EVOLUTION_BASE_URL: http://evolution-api:8080
      EVOLUTION_API_KEY: ${EVOLUTION_API_KEY:-change-me}
      EVOLUTION_INSTANCE: ${EVOLUTION_INSTANCE:-bot}
    depends_on:
      - evolution-api

  evolution-api:
    image: evoapicloud/evolution-api:latest
    container_name: evolution-api
    ports:
      - "8081:8080"
    environment:
      AUTHENTICATION_API_KEY: ${EVOLUTION_API_KEY:-change-me}
      SERVER_URL: http://localhost:8081
      DATABASE_ENABLED: "true"
      DATABASE_PROVIDER: postgresql
      DATABASE_CONNECTION_URI: postgresql://evolution:evolution@postgres:5432/evolution?schema=public
      CACHE_REDIS_ENABLED: "true"
      CACHE_REDIS_URI: redis://redis:6379/0
      CACHE_REDIS_PREFIX_KEY: evolution
    volumes:
      - evolution_instances:/evolution/instances
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:16-alpine
    container_name: evolution-postgres
    environment:
      POSTGRES_USER: evolution
      POSTGRES_PASSWORD: evolution
      POSTGRES_DB: evolution
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: evolution-redis
    volumes:
      - redis_data:/data

volumes:
  evolution_instances:
  postgres_data:
  redis_data:
